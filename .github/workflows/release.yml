name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v1.4.7-dp.1'
        required: true
        type: string

permissions:
  contents: write

env:
  DRONEPEAK_REPO: ${{ github.repository }}
  SIGNING_STORE_FILE: ${{ runner.temp }}/release.jks
  SIGNING_KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
  SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
  SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
  SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

jobs:
  signed-apk-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check signing secrets are present
        run: |
          if [ -z "$SIGNING_KEYSTORE_B64" ] || [ -z "$SIGNING_STORE_PASSWORD" ] || [ -z "$SIGNING_KEY_ALIAS" ] || [ -z "$SIGNING_KEY_PASSWORD" ]; then
            echo "Signing secrets are required for release APK publishing." >&2
            exit 1
          fi

      - name: Decode keystore
        run: echo "$SIGNING_KEYSTORE_B64" | base64 --decode > "$SIGNING_STORE_FILE"

      - name: Build signed release APK
        run: ./gradlew assembleRelease testDebugUnitTest --no-daemon

      - name: Prepare release asset
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/*.apk "release/DronePeak-${RELEASE_TAG}.apk"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: DronePeak ${{ github.event.inputs.tag || github.ref_name }}
          files: release/*.apk
          generate_release_notes: true
